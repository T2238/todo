<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .filters button {
      padding: 6px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
      font-weight: 600;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: opacity 0.2s;
    }

    .todo-item.done {
      opacity: 0.55;
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item .text {
      flex: 1;
      font-size: 1rem;
      color: #222;
      word-break: break-word;
    }

    .todo-item.done .text {
      text-decoration: line-through;
      color: #999;
    }

    .todo-item .edit-input {
      flex: 1;
      font-size: 1rem;
      padding: 2px 6px;
      border: 1.5px solid #4f46e5;
      border-radius: 6px;
      outline: none;
    }

    .todo-item .actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .todo-item .actions button {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .todo-item .actions button:hover {
      background: #f0f0f0;
    }

    .empty {
      text-align: center;
      color: #aaa;
      margin-top: 40px;
      font-size: 1rem;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #888;
    }

    .footer button {
      background: none;
      border: none;
      color: #e55;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
    }

    .footer button:hover { color: #c00; }
  </style>
</head>
<body>
<div class="container">
  <h1>📝 TODO</h1>

  <div class="input-row">
    <input id="newTask" type="text" placeholder="新しいタスクを入力..." autocomplete="off">
    <button onclick="addTodo()">追加</button>
  </div>

  <div class="filters">
    <button class="active" onclick="setFilter('all', this)">すべて</button>
    <button onclick="setFilter('active', this)">未完了</button>
    <button onclick="setFilter('done', this)">完了済み</button>
  </div>

  <ul class="todo-list" id="todoList"></ul>
  <p class="empty" id="emptyMsg" style="display:none">タスクがありません</p>

  <div class="footer">
    <span id="counter"></span>
    <button onclick="clearDone()">完了済みを削除</button>
  </div>
</div>

<script>
  let todos = JSON.parse(localStorage.getItem('todos') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('todos', JSON.stringify(todos));
  }

  function render() {
    const list = document.getElementById('todoList');
    const visible = todos.filter(t =>
      filter === 'all' ? true : filter === 'done' ? t.done : !t.done
    );

    list.innerHTML = '';
    visible.forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.done ? ' done' : '');

      li.innerHTML = `
        <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggle(${todo.id})">
        <span class="text">${escHtml(todo.text)}</span>
        <div class="actions">
          <button title="編集" onclick="startEdit(${todo.id}, this)">✏️</button>
          <button title="削除" onclick="remove(${todo.id})">🗑️</button>
        </div>
      `;
      list.appendChild(li);
    });

    const active = todos.filter(t => !t.done).length;
    document.getElementById('counter').textContent = `残り ${active} 件`;
    document.getElementById('emptyMsg').style.display = visible.length === 0 ? 'block' : 'none';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addTodo() {
    const input = document.getElementById('newTask');
    const text = input.value.trim();
    if (!text) return;
    todos.push({ id: Date.now(), text, done: false });
    input.value = '';
    save();
    render();
  }

  function toggle(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  function startEdit(id, btn) {
    const li = btn.closest('.todo-item');
    const span = li.querySelector('.text');
    const todo = todos.find(t => t.id === id);

    const input = document.createElement('input');
    input.className = 'edit-input';
    input.value = todo.text;
    span.replaceWith(input);
    input.focus();

    btn.textContent = '✅';
    btn.onclick = () => commitEdit(id, input);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') commitEdit(id, input);
      if (e.key === 'Escape') render();
    });
  }

  function commitEdit(id, input) {
    const text = input.value.trim();
    if (!text) return;
    const todo = todos.find(t => t.id === id);
    if (todo) { todo.text = text; save(); render(); }
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function clearDone() {
    todos = todos.filter(t => !t.done);
    save();
    render();
  }

  document.getElementById('newTask').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  render();
</script>
</body>
</html>
